<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#0a0a0a"/>

  <!-- STATUS BAR -->
  <text x="24" y="22" font-family="monospace" font-size="13" font-weight="700" fill="white">9:41</text>
  <rect x="350" y="12" width="28" height="14" rx="3" fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <rect x="378" y="16" width="3" height="6" rx="1.5" fill="white" opacity="0.8"/>
  <rect x="352" y="14" width="22" height="10" rx="2" fill="white" opacity="0.8"/>
  <rect x="316" y="16" width="3" height="8" rx="1" fill="white" opacity="0.8"/>
  <rect x="321" y="14" width="3" height="10" rx="1" fill="white" opacity="0.8"/>
  <rect x="326" y="12" width="3" height="12" rx="1" fill="white" opacity="0.8"/>

  <!-- HEADER -->
  <rect x="16" y="36" width="40" height="40" rx="13" fill="#161616"/>
  <polyline points="29,56 24,51 29,46" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <text x="195" y="60" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Your Photos</text>
  <!-- Shot count badge -->
  <rect x="320" y="40" width="54" height="28" rx="8" fill="#161616"/>
  <text x="347" y="58" font-family="monospace" font-size="12" font-weight="700" fill="#e8ff47" text-anchor="middle">12 shots</text>

  <!-- TAB BAR -->
  <line x1="0" y1="92" x2="390" y2="92" stroke="#161616" stroke-width="1"/>
  <!-- Camera tab -->
  <rect x="0" y="92" width="195" height="44" fill="#0a0a0a"/>
  <circle cx="88" cy="114" r="8" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="88" cy="114" r="3" fill="#333"/>
  <text x="104" y="119" font-family="sans-serif" font-size="12" font-weight="700" fill="#333" letter-spacing="1">CAMERA</text>
  <!-- Gallery tab — active -->
  <rect x="195" y="92" width="195" height="44" fill="#0a0a0a"/>
  <rect x="195" y="133" width="195" height="3" rx="1.5" fill="#e8ff47"/>
  <rect x="266" y="104" width="20" height="18" rx="3" fill="none" stroke="#e8ff47" stroke-width="2"/>
  <circle cx="271" cy="109" r="1.5" fill="#e8ff47"/>
  <polyline points="286,122 281,116 266,122" stroke="#e8ff47" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <text x="292" y="119" font-family="sans-serif" font-size="12" font-weight="700" fill="#e8ff47" letter-spacing="1">GALLERY</text>

  <!-- PHOTO GRID — 3 columns, realistic film-toned photos -->
  <!-- Row 1 -->
  <!-- Photo 1 - warm kodak tones, party scene -->
  <rect x="1"   y="136" width="128" height="128" fill="#2a1a08"/>
  <radialGradient id="p1" cx="60%" cy="40%" r="60%"><stop offset="0%" stop-color="#5a3010"/><stop offset="100%" stop-color="#1a0a04"/></radialGradient>
  <rect x="1" y="136" width="128" height="128" fill="url(#p1)"/>
  <ellipse cx="65"  cy="220" rx="30" ry="50" fill="#000" opacity="0.4"/>
  <circle cx="90" cy="160" r="14" fill="#e8b040" opacity="0.2"/>

  <!-- Photo 2 - B&W portrait tone -->
  <rect x="131" y="136" width="128" height="128" fill="#1a1a1a"/>
  <radialGradient id="p2" cx="50%" cy="45%" r="55%"><stop offset="0%" stop-color="#3a3a3a"/><stop offset="100%" stop-color="#0a0a0a"/></radialGradient>
  <rect x="131" y="136" width="128" height="128" fill="url(#p2)"/>
  <ellipse cx="195" cy="230" rx="25" ry="45" fill="#111" opacity="0.5"/>
  <ellipse cx="185" cy="185" rx="18" ry="22" fill="#444" opacity="0.6"/>

  <!-- Photo 3 - Portra warm skin tones -->
  <rect x="261" y="136" width="128" height="128" fill="#2a1a10"/>
  <radialGradient id="p3" cx="40%" cy="50%" r="60%"><stop offset="0%" stop-color="#6a3a20"/><stop offset="100%" stop-color="#180a04"/></radialGradient>
  <rect x="261" y="136" width="128" height="128" fill="url(#p3)"/>
  <ellipse cx="315" cy="215" rx="28" ry="52" fill="#080402" opacity="0.4"/>
  <circle cx="340" cy="155" r="10" fill="#d08040" opacity="0.15"/>

  <!-- Row 2 -->
  <rect x="1"   y="265" width="128" height="128" fill="#201808"/>
  <radialGradient id="p4" cx="55%" cy="60%" r="55%"><stop offset="0%" stop-color="#483020"/><stop offset="100%" stop-color="#100804"/></radialGradient>
  <rect x="1" y="265" width="128" height="128" fill="url(#p4)"/>
  <ellipse cx="55" cy="350" rx="35" ry="45" fill="#000" opacity="0.35"/>

  <rect x="131" y="265" width="128" height="128" fill="#0a0a12"/>
  <radialGradient id="p5" cx="45%" cy="40%" r="65%"><stop offset="0%" stop-color="#20202a"/><stop offset="100%" stop-color="#050508"/></radialGradient>
  <rect x="131" y="265" width="128" height="128" fill="url(#p5)"/>
  <circle cx="180" cy="300" r="20" fill="#6060b0" opacity="0.15"/>

  <rect x="261" y="265" width="128" height="128" fill="#201a08"/>
  <radialGradient id="p6" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#503820"/><stop offset="100%" stop-color="#100804"/></radialGradient>
  <rect x="261" y="265" width="128" height="128" fill="url(#p6)"/>
  <ellipse cx="320" cy="330" rx="40" ry="60" fill="#060402" opacity="0.3"/>

  <!-- Row 3 -->
  <rect x="1"   y="394" width="128" height="128" fill="#1a1008"/>
  <radialGradient id="p7" cx="60%" cy="55%" r="58%"><stop offset="0%" stop-color="#402810"/><stop offset="100%" stop-color="#0c0804"/></radialGradient>
  <rect x="1" y="394" width="128" height="128" fill="url(#p7)"/>

  <rect x="131" y="394" width="128" height="128" fill="#181818"/>
  <radialGradient id="p8" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#353535"/><stop offset="100%" stop-color="#080808"/></radialGradient>
  <rect x="131" y="394" width="128" height="128" fill="url(#p8)"/>

  <rect x="261" y="394" width="128" height="128" fill="#241808"/>
  <radialGradient id="p9" cx="40%" cy="45%" r="55%"><stop offset="0%" stop-color="#583820"/><stop offset="100%" stop-color="#0e0804"/></radialGradient>
  <rect x="261" y="394" width="128" height="128" fill="url(#p9)"/>

  <!-- Grid lines between photos -->
  <rect x="129" y="136" width="2" height="386" fill="#0a0a0a"/>
  <rect x="259" y="136" width="2" height="386" fill="#0a0a0a"/>
  <rect x="1"   y="264" width="388" height="2" fill="#0a0a0a"/>
  <rect x="1"   y="393" width="388" height="2" fill="#0a0a0a"/>
  <rect x="1"   y="522" width="388" height="2" fill="#0a0a0a"/>

  <!-- Delete buttons on photos -->
  <rect x="105" y="140" width="20" height="20" rx="5" fill="rgba(0,0,0,0.65)"/>
  <line x1="110" y1="145" x2="120" y2="155" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="145" x2="110" y2="155" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Row 4 partial -->
  <rect x="1"   y="523" width="128" height="128" fill="#1c1408"/>
  <rect x="131" y="523" width="128" height="128" fill="#141414"/>
  <rect x="261" y="523" width="128" height="128" fill="#201808"/>

  <!-- Fade at bottom -->
  <linearGradient id="btmfade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0a0a0a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
  </linearGradient>
  <rect x="0" y="580" width="390" height="120" fill="url(#btmfade)"/>

  <!-- Home indicator -->
  <rect x="155" y="828" width="80" height="5" rx="2.5" fill="white" opacity="0.3"/>
</svg>
