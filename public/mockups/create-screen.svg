<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#0a0a0a"/>
  <!-- Header -->
  <rect x="0" y="0" width="390" height="80" fill="#0a0a0a"/>
  <!-- Back button -->
  <rect x="16" y="40" width="38" height="38" rx="11" fill="#161616"/>
  <polyline points="27,59 22,54 27,49" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Title -->
  <text x="195" y="62" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Create Event</text>
  <!-- Step indicator -->
  <text x="356" y="62" font-family="monospace" font-size="12" font-weight="700" fill="#e8ff47" text-anchor="middle">1/6</text>

  <!-- Content -->
  <!-- Event name field -->
  <text x="24" y="112" font-family="sans-serif" font-size="10" font-weight="700" fill="#444" letter-spacing="2">EVENT NAME</text>
  <rect x="16" y="120" width="358" height="52" rx="12" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="28" y="152" font-family="'Space Grotesk', sans-serif" font-size="16" fill="#f0f0f0">Sarah &amp; Tom's Wedding</text>
  <!-- Cursor -->
  <rect x="265" y="135" width="2" height="22" rx="1" fill="#e8ff47"/>

  <!-- Event type label -->
  <text x="24" y="200" font-family="sans-serif" font-size="10" font-weight="700" fill="#444" letter-spacing="2">EVENT TYPE</text>
  
  <!-- Type buttons row -->
  <!-- Wedding selected -->
  <rect x="16" y="208" width="80" height="36" rx="10" fill="rgba(232,255,71,0.08)" stroke="#e8ff47" stroke-width="1"/>
  <text x="56" y="231" font-family="sans-serif" font-size="12" font-weight="600" fill="#e8ff47" text-anchor="middle">Wedding</text>
  <!-- Birthday -->
  <rect x="104" y="208" width="80" height="36" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="144" y="231" font-family="sans-serif" font-size="12" font-weight="600" fill="#444" text-anchor="middle">Birthday</text>
  <!-- Party -->
  <rect x="192" y="208" width="60" height="36" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="222" y="231" font-family="sans-serif" font-size="12" font-weight="600" fill="#444" text-anchor="middle">Party</text>
  <!-- Trip -->
  <rect x="260" y="208" width="54" height="36" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="287" y="231" font-family="sans-serif" font-size="12" font-weight="600" fill="#444" text-anchor="middle">Trip</text>
  <!-- Corp -->
  <rect x="322" y="208" width="52" height="36" rx="10" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="348" y="231" font-family="sans-serif" font-size="11" font-weight="600" fill="#444" text-anchor="middle">Corp</text>

  <!-- Date field -->
  <text x="24" y="278" font-family="sans-serif" font-size="10" font-weight="700" fill="#444" letter-spacing="2">EVENT DATE</text>
  <rect x="16" y="286" width="358" height="52" rx="12" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="28" y="318" font-family="sans-serif" font-size="15" fill="#f0f0f0">September 14, 2026</text>

  <!-- Shot limit -->
  <text x="24" y="368" font-family="sans-serif" font-size="10" font-weight="700" fill="#444" letter-spacing="2">SHOTS PER GUEST</text>
  <rect x="16" y="376" width="358" height="90" rx="12" fill="#111" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Big number -->
  <text x="195" y="440" font-family="monospace" font-size="48" font-weight="700" fill="#e8ff47" text-anchor="middle">10</text>
  <!-- Slider line -->
  <rect x="48" y="458" width="294" height="3" rx="1.5" fill="#222"/>
  <rect x="48" y="458" width="130" height="3" rx="1.5" fill="#e8ff47"/>
  <circle cx="178" cy="459.5" r="8" fill="#e8ff47"/>

  <!-- Reveal mode -->
  <text x="24" y="502" font-family="sans-serif" font-size="10" font-weight="700" fill="#444" letter-spacing="2">REVEAL MODE</text>
  <!-- End of Event selected -->
  <rect x="16" y="510" width="358" height="56" rx="12" fill="rgba(232,255,71,0.06)" stroke="#e8ff47" stroke-width="1"/>
  <rect x="32" y="526" width="24" height="24" rx="7" fill="rgba(232,255,71,0.1)"/>
  <text x="68" y="540" font-family="sans-serif" font-size="13" font-weight="600" fill="#e8ff47">End of Event</text>
  <text x="68" y="556" font-family="sans-serif" font-size="11" fill="#444">Photos unlock when you tap Reveal</text>

  <!-- Next button -->
  <rect x="16" y="780" width="358" height="52" rx="13" fill="#e8ff47"/>
  <text x="195" y="812" font-family="sans-serif" font-size="15" font-weight="700" fill="#0a0a0a" text-anchor="middle">Continue</text>
</svg>
