name: Set Vercel Env & Redeploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  set-env-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set STRIPE_SECRET_KEY on Vercel
        run: |
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v10/projects/flash-roan/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"STRIPE_SECRET_KEY\",\"value\":\"${{ secrets.STRIPE_SECRET_KEY }}\",\"type\":\"encrypted\",\"target\":[\"production\"]}")
          echo "$RESPONSE" | grep -q '"id"' && echo "✓ STRIPE_SECRET_KEY set" || echo "Response: $RESPONSE"

      - name: Set NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY on Vercel
        run: |
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v10/projects/flash-roan/env" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY\",\"value\":\"${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}\",\"type\":\"plain\",\"target\":[\"production\"]}")
          echo "$RESPONSE" | grep -q '"id"' && echo "✓ NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY set" || echo "Response: $RESPONSE"

      - name: Trigger Vercel redeploy
        run: |
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"flash-roan","gitSource":{"type":"github","org":"behnamp","repo":"flash","ref":"main"}}')
          echo "$RESPONSE" | grep -q '"id"' && echo "✓ Redeploy triggered" || echo "Response: $RESPONSE"
