name: Set Vercel Env & Redeploy
on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Push env vars to Vercel
        env:
          T: ${{ secrets.VERCEL_TOKEN }}
          STRIPE: ${{ secrets.STRIPE_SECRET_KEY }}
          SVC: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANON: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          PK: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          RESEND: ${{ secrets.RESEND_API_KEY }}
          CRON: ${{ secrets.CRON_SECRET }}
        run: |
          URL="https://api.vercel.com/v10/projects/flash-roan/env"

          post() {
            curl -s -o /dev/null -w "%{http_code}" -X POST "$URL" \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$1\",\"value\":\"$2\",\"type\":\"$3\",\"target\":[\"production\",\"preview\",\"development\"]}"
          }

          echo "SUPABASE_URL: $(post NEXT_PUBLIC_SUPABASE_URL https://onvdddlkrlwaxwufgodq.supabase.co plain)"
          echo "SUPABASE_ANON: $(post NEXT_PUBLIC_SUPABASE_ANON_KEY "$ANON" plain)"
          echo "SUPABASE_SVC: $(post SUPABASE_SERVICE_ROLE_KEY "$SVC" encrypted)"
          echo "STRIPE_SK: $(post STRIPE_SECRET_KEY "$STRIPE" encrypted)"
          echo "STRIPE_PK: $(post NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY "$PK" plain)"
          echo "RESEND: $(post RESEND_API_KEY "$RESEND" encrypted)"
          echo "APP_URL: $(post NEXT_PUBLIC_APP_URL https://flashcam.app plain)"
          echo "CRON: $(post CRON_SECRET "$CRON" encrypted)"

      - name: Redeploy
        env:
          T: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer $T" \
            -H "Content-Type: application/json" \
            -d '{"name":"flash-roan","gitSource":{"type":"github","repoId":"behnamp/flash","ref":"main"}}' \
            | head -c 200
          echo ""
          echo "Done"
