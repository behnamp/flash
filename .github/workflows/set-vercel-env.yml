name: Set Vercel Env & Redeploy
on:
  workflow_dispatch:

jobs:
  set-env-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set all env vars on Vercel
        run: |
          for KEY_VAL in \
            "STRIPE_SECRET_KEY:${{ secrets.STRIPE_SECRET_KEY }}:encrypted" \
            "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}:plain" \
            "SUPABASE_SERVICE_ROLE_KEY:${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}:encrypted" \
            "RESEND_API_KEY:${{ secrets.RESEND_API_KEY }}:encrypted" \
            "NEXT_PUBLIC_APP_URL:https://flashcam.app:plain" \
            "CRON_SECRET:${{ secrets.CRON_SECRET }}:encrypted"
          do
            KEY=$(echo $KEY_VAL | cut -d: -f1)
            VAL=$(echo $KEY_VAL | cut -d: -f2)
            TYPE=$(echo $KEY_VAL | cut -d: -f3)
            curl -sf -X POST "https://api.vercel.com/v10/projects/flash-roan/env" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$KEY\",\"value\":\"$VAL\",\"type\":\"$TYPE\",\"target\":[\"production\"]}" \
              && echo "✓ $KEY" || echo "exists: $KEY"
          done

      - name: Done
        run: echo "✓ All env vars set"
