name: Set Vercel Env Vars
on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set Stripe env vars on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          curl -s -X POST "https://api.vercel.com/v10/projects/flash-roan/env" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"key":"STRIPE_SECRET_KEY","value":"${{ secrets.STRIPE_SECRET_KEY }}","type":"encrypted","target":["production","preview"]}'
